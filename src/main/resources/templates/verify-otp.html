<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Portal - Verify OTP</title>
    <link rel="stylesheet" th:href="@{/css/modern.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            padding: 20px;
        }
        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .auth-card h2 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--text-color);
        }
        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.8rem;
            letter-spacing: 10px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary-color);
        }
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .auth-btn:hover {
            background: var(--primary-hover);
        }
        .cancel-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            margin-top: 15px;
        }
        .cancel-btn:hover {
            background: var(--bg-light);
            color: var(--text-color);
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="font-size: 40px; margin-bottom: 15px;">✉️</div>
            <h2>Two-Step Verification</h2>
            <p>
                We have sent a 6-digit OTP to your registered email address. It is valid for 5 minutes.
            </p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                Invalid OTP.
            </div>

            <form th:action="@{/verify-otp}" method="post">
                <div class="form-group">
                    <input type="text" name="otp" required maxlength="6" pattern="\d{6}" placeholder="000000">
                </div>
                <button type="submit" class="auth-btn">Verify & Login</button>
            </form>
            
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="auth-btn cancel-btn">Cancel Login</button>
            </form>
        </div>
    </div>
</body>
</html>
