<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Applicants - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/modern.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .table-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: var(--bg-light);
            font-weight: 600;
            color: var(--text-color);
        }
        tr:hover {
            background-color: rgba(40, 167, 69, 0.03);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-applied { background: #e2e3e5; color: #383d41; }
        .status-shortlisted { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .btn-status {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-shortlist { background-color: #007bff; color: white; }
        .btn-shortlist:hover { background-color: #0069d9; transform: scale(1.05); }
        .btn-select { background-color: #28a745; color: white; }
        .btn-select:hover { background-color: #218838; transform: scale(1.05); }
        .btn-reject { background-color: #dc3545; color: white; }
        .btn-reject:hover { background-color: #c82333; transform: scale(1.05); }
        
        .match-score-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            background: #e9ecef;
            color: #495057;
        }
        .status-selected { background: #28a745; color: white; }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="nav-logo">JobPortal Employer</a>
        <label for="menu-toggle" class="menu-toggle-btn">&#9776;</label>
        <input type="checkbox" id="menu-toggle">

        <div class="nav-wrapper">
            <div class="nav-links">
                <a th:href="@{/employer/dashboard}">Dashboard</a>
                <a th:href="@{/employer/jobs/new}">Post New Job</a>
            </div>
            <div class="nav-buttons">
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn-pill btn-login" style="padding: 10px 25px;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 1200px; margin-top: 40px;">
        <h2 class="section-title" th:text="'Applicants for ' + ${job.title}">Applicants</h2>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Match Score</th>
                        <th>Current Status</th>
                        <th>Resume</th>
                        <th style="text-align: center;">Quick Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td>
                            <div style="font-weight: 600;" th:text="${app.student != null ? app.student.name : 'N/A'}">Name</div>
                            <small style="color: var(--text-muted);" th:text="${app.student != null ? app.student.email : 'N/A'}">Email</small>
                        </td>
                        <td>
                            <span class="match-score-pill" th:text="${matchScores != null and matchScores.containsKey(app.id) ? matchScores[app.id] : 0} + '%'">0%</span>
                        </td>
                        <td>
                            <span th:text="${app.applicationStatus != null ? app.applicationStatus : 'APPLIED'}" 
                                  th:class="'status-badge ' + (${app.applicationStatus == 'APPLIED' ? 'status-applied' : (app.applicationStatus == 'SHORTLISTED' ? 'status-shortlisted' : (app.applicationStatus == 'SELECTED' ? 'status-selected' : 'status-rejected'))})">
                                Status
                            </span>
                        </td>
                        <td>
                            <div th:if="${app.student != null and app.student.resumePath != null}" style="display: flex; flex-direction: column; gap: 5px;">
                                <a th:href="@{'/uploads/' + ${app.student.resumePath}}" target="_blank" style="color: var(--primary-color); font-weight: 500; text-decoration: none;">
                                    👁️ View Resume
                                </a>
                                <small style="color: var(--text-muted); font-size: 0.7rem;" th:text="${app.student.resumePath}"></small>
                            </div>
                            <span th:unless="${app.student != null and app.student.resumePath != null}" style="color: var(--text-muted);">No Resume</span>
                        </td>
                        <td style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                            <form th:action="@{/employer/applications/update-status}" method="post">
                                <input type="hidden" name="applicationId" th:value="${app.id}">
                                <input type="hidden" name="jobId" th:value="${job.id}">
                                <input type="hidden" name="status" value="SHORTLISTED">
                                <button type="submit" class="btn-status btn-shortlist" title="Shortlist">Shortlist</button>
                            </form>
                            <form th:action="@{/employer/applications/update-status}" method="post">
                                <input type="hidden" name="applicationId" th:value="${app.id}">
                                <input type="hidden" name="jobId" th:value="${job.id}">
                                <input type="hidden" name="status" value="SELECTED">
                                <button type="submit" class="btn-status btn-select" title="Select">Select</button>
                            </form>
                            <form th:action="@{/employer/applications/update-status}" method="post">
                                <input type="hidden" name="applicationId" th:value="${app.id}">
                                <input type="hidden" name="jobId" th:value="${job.id}">
                                <input type="hidden" name="status" value="REJECTED">
                                <button type="submit" class="btn-status btn-reject" title="Reject">Reject</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(applications)}">
                        <td colspan="5" style="text-align: center; padding: 3rem; color: var(--text-muted);">No applicants yet for this position.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
