<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/modern.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .form-container {
            max-width: 700px;
            margin: 60px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #ffc107; /* Warning color for edit */
        }
        .btn-submit {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #e0a800;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="nav-logo">JobPortal Employer</a>
        <label for="menu-toggle" class="menu-toggle-btn">&#9776;</label>
        <input type="checkbox" id="menu-toggle">

        <div class="nav-wrapper">
            <div class="nav-links">
                <a th:href="@{/employer/dashboard}">Dashboard</a>
                <a th:href="@{/employer/jobs/new}">Post New Job</a>
            </div>
            <div class="nav-buttons">
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn-pill btn-login" style="padding: 10px 25px;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="form-container">
        <h2 style="margin-top: 0; margin-bottom: 30px; font-size: 2rem;">Edit Job Details</h2>
        
        <form th:action="@{'/employer/jobs/update/' + ${job.id}}" th:object="${job}" method="post">
            <div class="form-group">
                <label>Job Title</label>
                <input type="text" th:field="*{title}" required>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}">
                        <option value="IT">IT / Software</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Finance">Finance</option>
                        <option value="Design">Design</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" th:field="*{location}" required>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Salary Range</label>
                    <input type="text" th:field="*{salary}" required>
                </div>
                <div class="form-group">
                    <label>Skills Required (Comma-separated)</label>
                    <input type="text" th:field="*{skillsRequired}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Job Description</label>
                <textarea th:field="*{description}" rows="6" required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Update Job Posting</button>
        </form>
    </div>
</body>
</html>
