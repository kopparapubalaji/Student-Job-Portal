<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Portal - Register</title>
    <link rel="stylesheet" th:href="@{/css/modern.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            padding: 20px;
        }
        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border-color);
        }
        .auth-card h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--text-color);
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background: var(--primary-hover);
        }
    </style>
</head>
<body>
    <!-- Simple Navbar for Auth Pages -->
    <nav class="navbar">
        <a href="/" class="nav-logo">JobPortal</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a th:href="@{/login}">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select th:field="*{role}" required>
                        <option value="ROLE_STUDENT">Student (Looking for Jobs)</option>
                        <option value="ROLE_EMPLOYER">Employer (Hiring Talent)</option>
                        <option value="ROLE_ADMIN">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="auth-btn">Register Account</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.95rem;">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Log in here</a>
            </p>
        </div>
    </div>
</body>
</html>
